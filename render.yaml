services:
  - type: web
    name: music-database
    runtime: python
    buildCommand: |
      pip install -r requirements.txt
      python -c "from app import app, db; with app.app_context(): db.create_all()"
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: music-database-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: music-database-db
    databaseName: songs
    user: music_user
    plan: free